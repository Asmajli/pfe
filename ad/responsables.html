<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkAdmin · Gestion Responsables</title>
<link rel="stylesheet" href="style.css">
<style>
.resp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2rem}
.resp-card{
  background:var(--card);border:1px solid var(--border);
  padding:1.4rem;position:relative;overflow:hidden;transition:all .2s;
}
.resp-card:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(0,0,0,.4)}
.rc-status{
  position:absolute;top:1rem;right:1rem;
  width:9px;height:9px;border-radius:50%;
}
.rc-online{background:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.2)}
.rc-offline{background:var(--muted)}
.rc-head{display:flex;align-items:center;gap:0.9rem;margin-bottom:1rem}
.rc-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white;flex-shrink:0}
.rc-name{font-size:14px;font-weight:700;line-height:1.2}
.rc-role{font-size:10px;color:var(--muted);font-weight:300}
.rc-info{font-size:11px;line-height:2;color:var(--text2)}
.rc-info strong{color:var(--muted);font-weight:400;margin-right:.3rem}
.rc-actions{display:flex;gap:.5rem;margin-top:1rem;border-top:1px solid var(--border2);padding-top:1rem}
</style>
</head>
<body>
<div class="layout">
<div class="main">
  <div class="page-hdr">
    <div class="page-hdr-left"><h2>🛡️ Gestion Responsables</h2><p>Équipe et planning des shifts</p></div>
    <button class="btn btn-primary" onclick="openModal('mAddResp')">+ Nouveau responsable</button>
  </div>

  <div class="stats-row">
    <div class="stat-card c-blue"><div class="stat-ico">🛡️</div><div class="stat-val">8</div><div class="stat-lbl">Total</div></div>
    <div class="stat-card c-green"><div class="stat-ico">🟢</div><div class="stat-val">6</div><div class="stat-lbl">En service</div></div>
    <div class="stat-card c-yellow"><div class="stat-ico">📅</div><div class="stat-val">2</div><div class="stat-lbl">En congé</div></div>
    <div class="stat-card c-purple"><div class="stat-ico">⏰</div><div class="stat-val">3</div><div class="stat-lbl">Postes couverts</div></div>
  </div>

  <div class="resp-grid" id="respGrid"></div>

  <div class="panel">
    <div class="panel-hdr">
      <span class="panel-title">📆 Planning des shifts</span>
      <div class="panel-controls">
        <input id="srchR" class="inp" placeholder="Rechercher..." style="width:180px" oninput="filterTable('srchR','tR')">
        <button class="btn btn-outline btn-sm" onclick="toast('Planning exporté !','info')">Exporter</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table id="tR">
        <thead><tr><th>Responsable</th><th>Zone</th><th>Shift</th><th>Début</th><th>Fin</th><th>Heures/mois</th><th>Statut</th><th>Actions</th></tr></thead>
        <tbody id="tRBody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<div class="modal-ov" id="mAddResp">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-hdr-title">Nouveau responsable</span><button class="modal-close" onclick="closeModal('mAddResp')">✕</button></div>
    <div class="modal-body">
      <div class="f-row">
        <div class="f-group"><label class="f-label">Nom complet</label><input class="inp f-input" placeholder="Nadia Hamidi"></div>
        <div class="f-group"><label class="f-label">Email</label><input class="inp f-input" type="email" placeholder="n.hamidi@parking.dz"></div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">Téléphone</label><input class="inp f-input" placeholder="0555 000 111"></div>
        <div class="f-group"><label class="f-label">Zone affectée</label><select class="inp f-input"><option>Zone A</option><option>Zone B</option><option>Zone C</option><option>Zone VIP</option></select></div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">Shift</label><select class="inp f-input"><option>Matin 06h–14h</option><option>Après-midi 14h–22h</option><option>Nuit 22h–06h</option></select></div>
        <div class="f-group"><label class="f-label">Rôle</label><select class="inp f-input"><option>Responsable de zone</option><option>Superviseur</option><option>Agent sécurité</option></select></div>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-outline" onclick="closeModal('mAddResp')">Annuler</button>
      <button class="btn btn-primary" onclick="closeModal('mAddResp');toast('Responsable ajouté !')">Enregistrer</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
buildLayout('Gestion Responsables','responsables');

const avCols=['#2563eb','#8b5cf6','#10b981','#f59e0b','#06b6d4','#ef4444','#ec4899','#14b8a6'];
const resps=[
  {n:'Nadia Hamidi',r:'Superviseure générale',z:'Toutes zones',sh:'Matin',t:'0555 001 122',e:'n.hamidi@parking.dz',online:true,h:'247h'},
  {n:'Omar Benali',r:'Responsable Zone A',z:'Zone A',sh:'Après-midi',t:'0661 223 344',e:'o.benali@parking.dz',online:true,h:'183h'},
  {n:'Siham Lakehal',r:'Responsable Zone B',z:'Zone B',sh:'Matin',t:'0770 445 566',e:'s.lakehal@parking.dz',online:false,h:'210h'},
  {n:'Adel Ouadah',r:'Agent sécurité',z:'Zone C',sh:'Nuit',t:'0555 667 788',e:'a.ouadah@parking.dz',online:true,h:'156h'},
  {n:'Meriem Touati',r:'Responsable VIP',z:'Zone VIP',sh:'Après-midi',t:'0661 889 900',e:'m.touati@parking.dz',online:true,h:'192h'},
  {n:'Hocine Ziane',r:'Agent sécurité',z:'Zone A',sh:'Nuit',t:'0770 112 233',e:'h.ziane@parking.dz',online:false,h:'174h'},
];
document.getElementById('respGrid').innerHTML=resps.map((r,i)=>`
  <div class="resp-card">
    <div class="rc-status ${r.online?'rc-online':'rc-offline'}"></div>
    <div class="rc-head">
      <div class="rc-av" style="background:${avCols[i]}">${r.n.charAt(0)}</div>
      <div><div class="rc-name">${r.n}</div><div class="rc-role">${r.r}</div></div>
    </div>
    <div class="rc-info">
      <strong>📍</strong>${r.z}<br>
      <strong>⏰</strong>${r.sh}<br>
      <strong>📞</strong>${r.t}<br>
      <strong>⏱️</strong><span style="color:var(--green)">${r.h} ce mois</span>
    </div>
    <div class="rc-actions">
      <button class="btn btn-outline btn-sm" onclick="toast('Profil de ${r.n}','info')">Voir profil</button>
      <button class="btn btn-danger btn-sm" onclick="toast('${r.n} retiré','danger')">Retirer</button>
    </div>
  </div>`).join('');

const shifts=[
  {n:'Nadia Hamidi',z:'Toutes zones',sh:'Matin',d:'06:00',f:'14:00',h:'247h',st:'En service'},
  {n:'Omar Benali',z:'Zone A',sh:'Après-midi',d:'14:00',f:'22:00',h:'183h',st:'En service'},
  {n:'Siham Lakehal',z:'Zone B',sh:'Matin',d:'06:00',f:'14:00',h:'210h',st:'Congé'},
  {n:'Adel Ouadah',z:'Zone C',sh:'Nuit',d:'22:00',f:'06:00',h:'156h',st:'En service'},
  {n:'Meriem Touati',z:'Zone VIP',sh:'Après-midi',d:'14:00',f:'22:00',h:'192h',st:'En service'},
  {n:'Hocine Ziane',z:'Zone A',sh:'Nuit',d:'22:00',f:'06:00',h:'174h',st:'Congé'},
];
const shStMap={'En service':'b-green','Congé':'b-yellow','En attente':'b-blue'};
document.getElementById('tRBody').innerHTML=shifts.map(s=>`<tr>
  <td>${s.n}</td>
  <td><span class="badge b-blue">${s.z}</span></td>
  <td>${s.sh}</td><td>${s.d}</td><td>${s.f}</td>
  <td style="color:var(--green);font-weight:600">${s.h}</td>
  <td><span class="badge ${shStMap[s.st]}">${s.st}</span></td>
  <td><button class="btn btn-outline btn-sm" onclick="toast('Shift modifié')">Modifier</button></td>
</tr>`).join('');
</script>
</body>
</html>
