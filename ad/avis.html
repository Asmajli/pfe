<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkAdmin · Avis Clients</title>
<link rel="stylesheet" href="style.css">
<style>
.avis-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-bottom:2rem}
.avis-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;transition:all .2s;box-shadow:var(--shadow)}
.avis-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.avis-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.8rem}
.avis-user{display:flex;align-items:center;gap:.7rem}
.avis-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0}
.avis-name{font-size:13px;font-weight:600;color:var(--text)}
.avis-date{font-size:10px;color:var(--muted)}
.stars{color:#f59e0b;font-size:14px;letter-spacing:1px}
.avis-text{font-size:12px;color:var(--text2);line-height:1.7;margin:0.6rem 0 1rem;font-style:italic}
.avis-actions{display:flex;gap:.5rem;padding-top:0.8rem;border-top:1px solid var(--border)}
.rb-row{display:flex;align-items:center;gap:.6rem;font-size:11px;margin-bottom:0.5rem}
.rb-stars{color:#f59e0b;width:60px;text-align:right;flex-shrink:0}
.rb-track{flex:1;height:8px;background:var(--surface);border-radius:4px;overflow:hidden}
.rb-fill{height:100%;background:#f59e0b;border-radius:4px;transition:width 1s ease}
.rb-count{width:35px;color:var(--muted);font-size:10px;flex-shrink:0;text-align:right}
.empty-state{text-align:center;padding:3rem;color:var(--muted);grid-column:1/-1}
</style>
</head>
<body>
<div class="layout">
<div class="main">
  <div class="page-hdr">
    <div class="page-hdr-left"><h2>⭐ Avis Clients</h2><p>Avis laissés sur l'application mobile</p></div>
  </div>

  <div class="stats-row">
    <div class="stat-card c-yellow"><div class="stat-ico">⭐</div><div class="stat-val" id="avgRating">—</div><div class="stat-lbl">Note moyenne</div></div>
    <div class="stat-card c-blue"><div class="stat-ico">💬</div><div class="stat-val" id="totalAvis">—</div><div class="stat-lbl">Total avis</div></div>
    <div class="stat-card c-green"><div class="stat-ico">😊</div><div class="stat-val" id="positiveAvis">—</div><div class="stat-lbl">Positifs (4-5★)</div></div>
    <div class="stat-card c-red"><div class="stat-ico">😟</div><div class="stat-val" id="negativeAvis">—</div><div class="stat-lbl">Négatifs (1-2★)</div></div>
  </div>

  <div class="g2 mb2">
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title">📊 Distribution des notes</span></div>
      <div style="padding:1.5rem" id="ratingBars">
        <div style="text-align:center;color:var(--muted);padding:1rem">Chargement...</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title">ℹ️ Résumé</span></div>
      <div style="padding:1.5rem;font-size:13px;color:var(--text2);line-height:2" id="avisSummary">
        Chargement...
      </div>
    </div>
  </div>

  <div class="avis-grid" id="avisGrid">
    <div class="empty-state">⏳ Chargement...</div>
  </div>

  <div class="panel">
    <div class="panel-hdr">
      <span class="panel-title">📋 Tous les avis</span>
      <div class="panel-controls">
        <input id="srchAv" class="inp" placeholder="Rechercher..." style="width:180px" oninput="searchAvis(this.value)">
        <select class="inp" style="width:130px" onchange="filterByRating(this.value)">
          <option value="">Toutes notes</option>
          <option value="5">5 ⭐</option>
          <option value="4">4 ⭐</option>
          <option value="3">3 ⭐</option>
          <option value="2">2 ⭐</option>
          <option value="1">1 ⭐</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table id="tAv">
        <thead><tr><th>Client</th><th>Note</th><th>Commentaire</th><th>Parking</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody id="tAvBody"><tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">Chargement...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<!-- Modal voir avis -->
<div class="modal-ov" id="mViewAvis">
  <div class="modal" style="max-width:480px">
    <div class="modal-hdr">
      <span class="modal-hdr-title">💬 Détail de l'avis</span>
      <button class="modal-close" onclick="closeModal('mViewAvis')">✕</button>
    </div>
    <div class="modal-body" id="viewAvisBody"></div>
    <div class="modal-ftr">
      <button class="btn btn-danger btn-sm" id="btnDelAvis">🗑 Supprimer</button>
      <button class="btn btn-outline" onclick="closeModal('mViewAvis')">Fermer</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi-UTQReIk0l5gA9ayDNgUrEIXWteDPXQ",
  authDomain: "pfes-5bb45.firebaseapp.com",
  projectId: "pfes-5bb45",
  storageBucket: "pfes-5bb45.appspot.com",
  messagingSenderId: "857843523698",
  appId: "1:857843523698:web:a8cd7566edb367eee6e2eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const avCols = ['#6366f1','#06b6d4','#10b981','#8b5cf6','#f59e0b','#ef4444','#ec4899','#14b8a6'];
let allAvis = [];

const stars = n => '★'.repeat(Math.round(n)) + '☆'.repeat(5 - Math.round(n));

async function loadAvis() {
  try {
    const snap = await getDocs(collection(db, 'avis'));
    allAvis = [];
    snap.forEach(d => allAvis.push({ id: d.id, ...d.data() }));
    allAvis.sort((a, b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

    // Stats
    const total = allAvis.length;
    const avg = total > 0 ? (allAvis.reduce((s, a) => s + (a.rating||a.note||0), 0) / total).toFixed(1) : '—';
    const positive = allAvis.filter(a => (a.rating||a.note||0) >= 4).length;
    const negative = allAvis.filter(a => (a.rating||a.note||0) <= 2).length;

    document.getElementById('avgRating').textContent = avg;
    document.getElementById('totalAvis').textContent = total;
    document.getElementById('positiveAvis').textContent = positive;
    document.getElementById('negativeAvis').textContent = negative;

    // Rating bars
    const counts = [5,4,3,2,1].map(s => ({
      s, count: allAvis.filter(a => Math.round(a.rating||a.note||0) === s).length
    }));
    const maxCount = Math.max(...counts.map(c => c.count), 1);
    document.getElementById('ratingBars').innerHTML = counts.map(c => `
      <div class="rb-row">
        <div class="rb-stars">${'★'.repeat(c.s)}</div>
        <div class="rb-track"><div class="rb-fill" style="width:${Math.round(c.count/maxCount*100)}%"></div></div>
        <div class="rb-count">${c.count}</div>
      </div>`).join('');

    // Summary
    document.getElementById('avisSummary').innerHTML = total === 0
      ? 'Aucun avis pour le moment.'
      : `<div>📊 <strong>${total}</strong> avis au total</div>
         <div>⭐ Note moyenne: <strong style="color:#f59e0b">${avg}/5</strong></div>
         <div>😊 Avis positifs (4-5★): <strong style="color:var(--green)">${positive}</strong></div>
         <div>😟 Avis négatifs (1-2★): <strong style="color:var(--red)">${negative}</strong></div>
         <div>😐 Avis neutres (3★): <strong>${total - positive - negative}</strong></div>`;

    renderAvisCards(allAvis.slice(0, 6));
    renderAvisTable(allAvis);
  } catch(e) {
    console.error(e);
    toast('Erreur chargement avis', 'danger');
  }
}

function renderAvisCards(data) {
  const grid = document.getElementById('avisGrid');
  if(data.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:3rem">⭐</div><div style="margin-top:0.5rem">Aucun avis pour le moment</div></div>`;
    return;
  }
  grid.innerHTML = data.map((a, i) => {
    const name = a.userName || a.userId?.substring(0,8) || 'Client';
    const rating = a.rating || a.note || 0;
    const comment = a.comment || a.commentaire || a.text || '';
    const zone = a.zoneName || a.parkingName || a.zoneId || '—';
    const date = a.createdAt ? new Date(a.createdAt.seconds*1000).toLocaleDateString('fr-FR') : '—';
    return `<div class="avis-card">
      <div class="avis-head">
        <div class="avis-user">
          <div class="avis-av" style="background:${avCols[i % avCols.length]}">${name.charAt(0).toUpperCase()}</div>
          <div>
            <div class="avis-name">${name}</div>
            <div class="avis-date">${date}</div>
          </div>
        </div>
        <div class="stars">${stars(rating)}</div>
      </div>
      <div class="avis-text">${comment ? `"${comment}"` : '<em style="color:var(--muted)">Pas de commentaire</em>'}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="badge b-blue">${zone}</span>
        <button class="btn btn-danger btn-sm" onclick="window._delAvis('${a.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function renderAvisTable(data) {
  if(data.length === 0) {
    document.getElementById('tAvBody').innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">Aucun avis</td></tr>`;
    return;
  }
  document.getElementById('tAvBody').innerHTML = data.map((a, i) => {
    const name = a.userName || a.userId?.substring(0,8) || 'Client';
    const rating = a.rating || a.note || 0;
    const comment = a.comment || a.commentaire || a.text || '—';
    const zone = a.zoneName || a.parkingName || '—';
    const date = a.createdAt ? new Date(a.createdAt.seconds*1000).toLocaleDateString('fr-FR') : '—';
    const starColor = rating >= 4 ? 'var(--green)' : rating >= 3 ? '#f59e0b' : 'var(--red)';
    return `<tr>
      <td><div class="name-cell">
        <div class="av" style="background:${avCols[i % avCols.length]}">${name.charAt(0).toUpperCase()}</div>
        ${name}
      </div></td>
      <td style="color:${starColor};font-weight:700">${'★'.repeat(Math.round(rating))} ${rating}/5</td>
      <td style="max-width:220px;font-size:11px;color:var(--text2)">${comment.substring(0,80)}${comment.length>80?'...':''}</td>
      <td><span class="badge b-blue">${zone}</span></td>
      <td style="color:var(--muted);font-size:11px">${date}</td>
      <td><button class="btn btn-danger btn-sm" onclick="window._delAvis('${a.id}')">🗑</button></td>
    </tr>`;
  }).join('');
}

window.searchAvis = function(val) {
  const q = val.toLowerCase();
  const filtered = allAvis.filter(a =>
    (a.userName||'').toLowerCase().includes(q) ||
    (a.comment||a.commentaire||'').toLowerCase().includes(q) ||
    (a.zoneName||a.parkingName||'').toLowerCase().includes(q)
  );
  renderAvisCards(filtered.slice(0,6));
  renderAvisTable(filtered);
};

window.filterByRating = function(val) {
  const filtered = val ? allAvis.filter(a => Math.round(a.rating||a.note||0) === parseInt(val)) : allAvis;
  renderAvisCards(filtered.slice(0,6));
  renderAvisTable(filtered);
};

window._delAvis = async function(id) {
  if(!confirm('Supprimer cet avis ?')) return;
  try {
    await deleteDoc(doc(db, 'avis', id));
    toast('Avis supprimé', 'danger');
    loadAvis();
  } catch(e) {
    toast('Erreur: ' + e.message, 'danger');
  }
};

buildLayout('Avis Clients', 'avis');
loadAvis();
</script>
</body>
</html>
